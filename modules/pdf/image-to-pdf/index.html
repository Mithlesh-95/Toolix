<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to PDF — Toolix</title>
  <meta name="description" content="Convert images to PDF. Fast, secure, and completely client-side. Your files never touch a server.">
  
  <!-- CSS & Theme Loader -->
  <link rel="stylesheet" href="../../../shared/ui/style.css">
  <script src="../../../shared/utils/theme.js"></script>

  <!-- PDF Processing Libraries (CDN) -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>

  <!-- Global Navigation Header -->
  <toolix-header></toolix-header>

  <main class="workspace-container">
    
    <!-- Breadcrumbs / Navigation -->
    <nav style="font-size: var(--text-xs); color: var(--text-muted);">
      <a href="../index.html" class="nav-link" style="display: inline-flex; align-items: center; gap: 4px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        PDF Utilities
      </a>
      <span style="margin: 0 6px;">/</span>
      <span class="text-secondary">Image to PDF</span>
    </nav>

    <!-- Workspace Title -->
    <header style="margin-bottom: var(--space-xs);">
      <h1 class="text-xl" style="font-weight: 600;">Image to PDF</h1>
      <p class="text-sm text-secondary">Convert images (PNG, JPG, WebP) to a clean PDF. Drag to reorder pages.</p>
    </header>

    <!-- Workspace Grid Layout -->
    <div class="workspace-layout">
      
      <!-- Main Action Area: Canvas -->
      <section class="card" id="canvas-area" style="min-height: 380px; display: flex; flex-direction: column; justify-content: center; position: relative;">
        
        <!-- Drag and Drop Upload Zone (Shown initially) -->
        <div id="drop-zone" class="upload-zone">
          <input type="file" id="file-input" multiple accept="image/png, image/jpeg, image/jpg, image/webp">
          <div class="upload-zone-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <div>
            <p class="text-md" style="font-weight: 500; margin-bottom: var(--space-xs);">Drag & drop images here</p>
            <p class="text-xs text-muted">supports PNG, JPG, JPEG, and WebP files</p>
          </div>
        </div>

        <!-- Files List & Previews Container (Hidden initially) -->
        <div id="files-container" style="display: none; width: 100%;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md);">
            <span class="text-xs label" id="files-count-label">Uploaded Images (0)</span>
            <button class="btn btn-secondary text-xs" id="add-more-btn" style="padding: 4px var(--space-sm); font-size: var(--text-xs); display: flex; align-items: center; gap: 4px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Images
              <input type="file" id="file-input-extra" multiple accept="image/png, image/jpeg, image/jpg, image/webp" style="position: absolute; opacity: 0; width: 90px; height: 26px; cursor: pointer; pointer-events: none;">
            </button>
          </div>
          
          <div class="file-list" id="file-preview-grid">
            <!-- Image cards injected dynamically here -->
          </div>
        </div>

      </section>

      <!-- Control Settings Area: Panel -->
      <aside class="card" style="display: flex; flex-direction: column; gap: var(--space-lg); justify-content: space-between;">
        
        <div style="display: flex; flex-direction: column; gap: var(--space-md);">
          <h2 class="text-xs label" style="margin-bottom: var(--space-xs);">Page Settings</h2>
          
          <!-- Page Size Selector -->
          <div class="form-group">
            <label class="label">Page Size</label>
            <select id="page-size-select" class="select">
              <option value="auto" selected>Auto (Match Image Size)</option>
              <option value="a4">A4 (595 x 842 pt)</option>
              <option value="letter">US Letter (612 x 792 pt)</option>
            </select>
          </div>

          <!-- Page Orientation Selector -->
          <div class="form-group" id="orientation-group" style="display: none;">
            <label class="label">Orientation</label>
            <select id="orientation-select" class="select">
              <option value="portrait" selected>Portrait</option>
              <option value="landscape">Landscape</option>
            </select>
          </div>

          <!-- Margin Selector -->
          <div class="form-group">
            <label class="label">Page Margins</label>
            <select id="margin-select" class="select">
              <option value="none" selected>No Margin (0 pt)</option>
              <option value="small">Small Margin (20 pt)</option>
              <option value="large">Large Margin (40 pt)</option>
            </select>
          </div>
        </div>

        <div>
          <!-- Progress Tracking -->
          <div id="progress-wrapper" class="progress-container" style="display: none; margin-bottom: var(--space-md);">
            <div style="display: flex; justify-content: space-between; font-size: var(--text-xs);">
              <span id="progress-status" class="text-muted">Generating PDF...</span>
              <span id="progress-percent" style="font-weight: 600;">0%</span>
            </div>
            <div class="progress-track">
              <div id="progress-bar-fill" class="progress-fill"></div>
            </div>
          </div>

          <!-- Alert State Message -->
          <div id="alert-box" class="alert" style="display: none;"></div>

          <!-- Execute Button -->
          <button class="btn btn-primary" id="convert-btn" disabled style="width: 100%; padding: var(--space-md); font-size: var(--text-sm); font-weight: 600;">
            Convert to PDF
          </button>
        </div>

      </aside>

    </div>
  </main>

  <!-- Global Footer -->
  <toolix-footer></toolix-footer>

  <!-- Loader scripts -->
  <script src="../../../shared/utils/history.js"></script>
  <script src="../../../shared/utils/download.js"></script>
  <script src="../../../shared/components/header.js"></script>
  <script src="../../../shared/components/footer.js"></script>
  <script src="app.js"></script>
</body>
</html>
